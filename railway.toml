# Railway: create a new project → Deploy from GitHub → select this repo.
# Set env vars in Railway dashboard (see deploy/README.md), then redeploy.
#
# After deploy, copy the public URL into Vercel:
#   WORKER_URL=https://<your-service>.up.railway.app

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
